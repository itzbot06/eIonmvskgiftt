<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win $5000 Instantly - Cash App Offer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* আপনার ছবি 'trial.png' এখানে কানেক্ট করা হয়েছে */
        .landing-container {
            background-image: url('trial.png'); 
            background-size: cover;
            background-position: center top;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            color: white;
            position: relative;
        }

        .content-overlay {
            background: linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0.85));
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 55%;
            z-index: 1;
        }

        .header {
            width: 90%;
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .cash-app-logo {
            width: 35px;
            height: auto;
        }

        .cta-content {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 400px;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.3rem;
            font-weight: 900;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            text-shadow: 2px 2px 5px rgba(0,0,0,1);
        }

        p {
            font-size: 1.1rem;
            margin: 0 0 25px 0;
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .claim-btn {
            background-color: #00D632;
            color: white;
            padding: 18px;
            font-size: 22px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
            display: block;
            width: 100%;
            box-sizing: border-box;
            border: 2px solid white;
            transition: 0.2s;
        }

        .claim-btn:active {
            transform: scale(0.95);
        }

        .live-payment-feed {
            font-size: 0.85rem;
            color: #00D632;
            margin-top: 15px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.9rem; }
            .claim-btn { font-size: 20px; padding: 16px; }
        }
    </style>
</head>
<body>

    <div class="landing-container">
        <div class="header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Cash_App_logo.svg/1280px-Cash_App_logo.svg.png" alt="Cash App" class="cash-app-logo">
            <div style="color:white; font-size: 24px;">≡</div>
        </div>

        <div class="content-overlay"></div>
        
        <div class="cta-content">
            <h1>WIN $5000 INSTANTLY!</h1>
            <p>Limited Slots Available! Claim Your Reward Securely via Cloudflare.</p>
            
            <a href="https://www.af9m8trk.com/RWG11EZJ/5JY122KX/?s1=Mashbir" class="claim-btn">CLAIM NOW 🔒</a>
            
            <div class="live-payment-feed">
                ● Live: User ******4 claimed $5000 in TX!
            </div>
        </div>
    </div>

</body>
</html>
