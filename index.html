<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win $5000 Instantly - Cash App Offer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        .landing-container {
            background-image: url('trial.png'); 
            background-size: cover;
            background-position: center top;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center;
            text-align: center;
            color: white;
            position: relative;
        }

        .content-overlay {
            background: linear-gradient(rgba(0,0,0,0) 0%, rgba(0,0,0,0.5) 20%, rgba(0,0,0,0.95) 100%);
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60%; 
            z-index: 1;
        }

        .cta-content {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 400px;
            /* আপনার অনুরোধ অনুযায়ী লেখা ও বাটন সামান্য উপরে তোলা হয়েছে */
            margin-bottom: 85px; 
        }

        h1 {
            font-size: 2.3rem;
            font-weight: 900;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
        }

        p {
            font-size: 1rem;
            margin: 0 0 25px 0;
            color: #ffffff;
            font-weight: 500;
            text-shadow: 1px 1px 5px rgba(0,0,0,1);
            line-height: 1.4;
        }

        .claim-btn {
            background-color: #00D632;
            color: white;
            padding: 18px;
            font-size: 22px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
            display: block;
            width: 100%;
            box-sizing: border-box;
            border: 2px solid white;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .claim-btn:active {
            transform: scale(0.95);
        }

        .live-payment-feed {
            font-size: 0.85rem;
            color: #00D632;
            margin-top: 15px;
            font-weight: bold;
            text-shadow: 1px 1px 5px rgba(0,0,0,1);
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.9rem; }
            .claim-btn { font-size: 20px; padding: 16px; }
            /* মোবাইলে পজিশন আরও নিখুঁত করার জন্য */
            .cta-content { margin-bottom: 70px; }
        }
    </style>
</head>
<body>

    <div class="landing-container">
        <div class="content-overlay"></div>
        
        <div class="cta-content">
            <h1>WIN $5000 INSTANTLY!</h1>
            <p>Limited Slots Available!</p>
            
            <a href="https://www.af9m8trk.com/RWG11EZJ/5JY122KX/?s1=Mashbir" class="claim-btn">CLAIM NOW 🔒</a>
            
            <div class="live-payment-feed">
                ● Live: User ******4 claimed $5000 in TX!
            </div>
        </div>
    </div>

</body>
</html>
