<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win $5000 Instantly - Cash App Offer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        .landing-container {
            background-image: url('trial.png'); 
            background-size: cover;
            background-position: center top;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center;
            text-align: center;
            color: #d1d1d1; /* ব্রাইটনেস কমানো হয়েছে */
            position: relative;
        }

        .content-overlay {
            background: linear-gradient(rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 20%, rgba(0,0,0,0.95) 100%);
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60%; 
            z-index: 1;
        }

        .cta-content {
            position: relative;
            z-index: 10;
            width: 95%; /* এক লাইনে হেডলাইন ফিট করার জন্য একটু বাড়ানো হয়েছে */
            max-width: 450px;
            margin-bottom: 85px; 
        }

        h1 {
            font-size: 1.8rem; /* এক লাইনে আনার জন্য ফন্ট ছোট করা হয়েছে */
            font-weight: 900;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            color: #e0e0e0; /* উজ্জ্বলতা কমানো হয়েছে */
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
            white-space: nowrap; /* লেখা যেন ২ লাইনে না যায় */
        }

        p {
            font-size: 0.95rem;
            margin: 0 0 25px 0;
            color: #b0b0b0; /* সাব-টেক্সট আরও ডার্ক করা হয়েছে */
            font-weight: 500;
            text-shadow: 1px 1px 5px rgba(0,0,0,1);
        }

        /* বাটনের ব্রাইটনেস কমানো এবং অ্যানিমেশন */
        .claim-btn {
            background-color: #00a326; /* ডার্ক গ্রিন */
            color: #eeeeee;
            padding: 16px;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            display: block;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.3); /* বর্ডার ব্রাইটনেস কমানো */
            text-transform: uppercase;
            
            /* লাফালাফি অ্যানিমেশন শুরু */
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .claim-btn:active {
            transform: scale(0.95);
            animation: none;
        }

        .live-payment-feed {
            font-size: 0.8rem;
            color: #008a20; /* পেমেন্ট ফীড আরও ডার্ক করা হয়েছে */
            margin-top: 15px;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; } /* মোবাইলে এক লাইনে রাখার জন্য আরও ছোট */
            .claim-btn { font-size: 18px; padding: 14px; }
            .cta-content { margin-bottom: 75px; }
        }
    </style>
</head>
<body>

    <div class="landing-container">
        <div class="content-overlay"></div>
        
        <div class="cta-content">
            <h1>WIN $5000 INSTANTLY!</h1>
            <p>Limited Slots Available! Claim Your Reward Securely.</p>
            
            <a href="https://www.af9m8trk.com/RWG11EZJ/5JY122KX/?s1=Mashbir" class="claim-btn">CLAIM NOW 🔒</a>
            
            <div class="live-payment-feed">
                ● Live: User ******4 claimed $5000 in TX!
            </div>
        </div>
    </div>

</body>
</html>
